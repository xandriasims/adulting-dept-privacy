<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Returning to BASCO Content Ops</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Georgia, "Times New Roman", serif;
      background: #f6f2ea;
      color: #2b2722;
    }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
    }
    main {
      width: min(560px, 100%);
      padding: 48px 36px;
      border: 1px solid #d8cfc0;
      border-radius: 24px;
      background: #fffdf8;
      box-shadow: 0 18px 50px rgba(43, 39, 34, 0.08);
      text-align: center;
    }
    h1 {
      margin: 0 0 16px;
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      line-height: 1.08;
    }
    p {
      margin: 0;
      color: #665e54;
      font-family: system-ui, sans-serif;
      line-height: 1.6;
    }
    a {
      display: inline-block;
      margin-top: 28px;
      color: #2b2722;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>Returning to BASCO Content Ops…</h1>
    <p>Sending TikTok authorization back to the app on your Mac.</p>
    <p><a id="continue" href="https://localhost:8789/callback">Continue manually</a></p>
  </main>
  <script>
    const localCallback = new URL("https://localhost:8789/callback");
    localCallback.search = window.location.search;
    document.getElementById("continue").href = localCallback.toString();
    window.location.replace(localCallback.toString());
  </script>
</body>
</html>
